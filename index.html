<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iframe injector</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Comic Sans MS;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>
<body>
<h1>aboutblankinject</h1>
<input type="text" id="urlInput" placeholder="enter site url" style="width:300px">
<label>
  <input type="checkbox" id="forceHttps" checked> auto add https://
</label>
<br>
<button id="openIframe">open iframe in new tab</button>
<button id="downloadBtn">download site</button>
<h6>This work is marked <a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a><img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="" style="max-width: 1em;max-height:1em;margin-left: .2em;"><img src="https://mirrors.creativecommons.org/presskit/icons/zero.svg" alt="" style="max-width: 1em;max-height:1em;margin-left: .2em;"></h6>
<script>
document.getElementById("openIframe").addEventListener("click", () => {
    let url = document.getElementById("urlInput").value.trim();
    if(!url) return alert("enter a valid url");

    const forceHttps = document.getElementById("forceHttps").checked;

    if(forceHttps && !/^https?:\/\//i.test(url)) {
        url = "https://" + url;
    }

    const newTab = window.open("about:blank");

    newTab.document.write(`
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <style>
                html, body { margin:0; padding:0; height:100%; }
                iframe { width:100%; height:100%; border:none; }
            </style>
        </head>
        <body>
            <iframe src="${url}"></iframe>
        </body>
        </html>
    `);

    newTab.document.close();
});

document.getElementById("downloadBtn").addEventListener("click", () => {
    const link = document.createElement("a");
    link.href = "download.html";
    link.download = "download.html"; 
    link.click();
});
</script>
<noscript>
    <h1>aboutblankinject</h1><p>enable javascript to use the site</p>
    <h6>This work is marked <a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a><img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="" style="max-width: 1em;max-height:1em;margin-left: .2em;"><img src="https://mirrors.creativecommons.org/presskit/icons/zero.svg" alt="" style="max-width: 1em;max-height:1em;margin-left: .2em;"></h6>
</noscript>
</body>
</html>
