<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iframe injector</title>

<style>
@font-face {
    font-family: "comic";
    src: url("https://lilcocoabean26.github.io/fonts/comic.ttf") format("truetype");
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "comic";
}

#main {
    padding: 20px;
    display: none;
}
</style>
</head>

<body>

<div id="main">
    <h1>aboutblankinject</h1>

    <input type="file" id="fileInput">

    <br><br>

    <button id="openIframe">open file in new tab</button>

    <h6>
        This work is marked
        <a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a>
        <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg"
             alt=""
             style="max-width:1em;max-height:1em;margin-left:.2em;">
        <img src="https://mirrors.creativecommons.org/presskit/icons/zero.svg"
             alt=""
             style="max-width:1em;max-height:1em;margin-left:.2em;">
    </h6>
</div>

<script>
document.getElementById("main").style.display = "block";

document.getElementById("openIframe").onclick = () => {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("upload a file");
        return;
    }

    const newTab = window.open("about:blank", "_blank");

    if (!newTab) {
        alert("popup blocked");
        return;
    }

    const fileURL = URL.createObjectURL(file);

    newTab.document.open();
    newTab.document.write(`
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>
<iframe src="${fileURL}"></iframe>
</body>
</html>
    `);
    newTab.document.close();
};
</script>

<noscript>
    <h1>aboutblankinject</h1>
    <p>enable javascript to use the site</p>
</noscript>

</body>
</html>
